<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line-by-Line Streaming EPUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Radley&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.88/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary: #2563eb;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --highlight: #dcfce7;
            --highlight-border: #22c55e;
            --loading: #fef9c3;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            overflow: hidden;
        }

        #app { display: flex; flex: 1; overflow: hidden; }

        #sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
        }

        #sidebar h3 { font-size: 1.1rem; margin-top: 0; color: #0f172a; }

        #toc { flex: 1; overflow-y: auto; margin-top: 10px; }
        .toc-item {
            cursor: pointer;
            padding: 6px 10px;
            margin-bottom: 2px;
            font-size: 13px;
            border-radius: 6px;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toc-item:hover { background: #f1f5f9; color: var(--primary); }

        #main { flex: 1; display: flex; flex-direction: column; background: #fff; }

        #controls {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
            background: #fff;
        }

        #status { font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; color: #64748b; }

        #viewer {
            flex: 1;
            overflow-y: auto;
            padding: 10px 10px 120px 10px;
            scroll-behavior: smooth;
        }

        #custom-content p {
            font-family: 'Radley', serif;
            font-size: 17px;
            line-height: 1.6;
            margin: 0 0 4px 0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        #custom-content p:hover { background: #f8fafc; }

        .buffering {
            background: var(--loading) !important;
            border-left-color: #eab308 !important;
            opacity: 0.7;
        }

        .speaking {
            background: var(--highlight) !important;
            border-left-color: var(--highlight-border) !important;
            color: #065f46 !important;
        }

        #player-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            height: 64px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            z-index: 1002;
        }

        #nowReading {
            font-size: 13px;
            color: #64748b;
            flex: 1;
            margin: 0;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        button {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover { background: #f1f5f9; border-color: #cbd5e1; }

        #playPauseBtn { background: var(--primary); color: white; border: none; padding: 8px 16px; min-width: 120px; }
        #playPauseBtn:hover { background: #1d4ed8; }

        #input { font-size: 12px; background: #f1f5f9; padding: 8px; border-radius: 8px; border: 1px dashed #cbd5e1; }
        #epub-render-ghost { display: none; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            #sidebar.active { transform: translateX(0); }
            #player-bar { bottom: 10px; width: 95%; height: auto; padding: 10px; flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <h3>Library</h3>
        <input type="file" id="input" accept=".epub" style="width: 100%; margin-bottom: 15px;">
        <div id="toc"></div>
    </div>
    <div id="main">
        <div id="controls">
            <button id="menu-toggle">☰ Menu</button>
            <button id="prev">←</button>
            <button id="next">→</button>
            <span id="status">Ready</span>
        </div>
        <div id="viewer">
            <div id="custom-content"></div>
        </div>
        <div id="epub-render-ghost"></div>
    </div>
</div>

<div id="player-bar">
    <button id="playPauseBtn">Stop TTS</button>
    <span id="nowReading"></span>
</div>

<script>
    const input = document.getElementById("input"), 
          status = document.getElementById("status"), 
          playPauseBtn = document.getElementById("playPauseBtn"), 
          nowReading = document.getElementById("nowReading"), 
          sidebar = document.getElementById("sidebar"), 
          menuToggle = document.getElementById("menu-toggle"), 
          customViewer = document.getElementById("custom-content");

    let book, rendition, currentHowl = null, isPlaying = false, currentParagraph = null;
    let wakeLock = null;
    
    // BUFFERING LOGIC
    const audioCache = new Map(); // Stores text -> Blob URL
    const pendingRequests = new Set(); // Prevents duplicate API calls
    const BUFFER_SIZE = 5;

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {
            console.error(`${err.name}, ${err.message}`);
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
    }

    menuToggle.onclick = () => sidebar.classList.toggle("active");

    input.addEventListener("change", (e) => {
        const reader = new FileReader();
        reader.onload = async (event) => {
            if (book) book.destroy();
            book = ePub(event.target.result);
            rendition = book.renderTo("epub-render-ghost", { width: "100%", height: "100%" });
            
            book.loaded.navigation.then(nav => {
                const tocContainer = document.getElementById("toc");
                tocContainer.innerHTML = "<h4>Contents</h4>";
                nav.toc.forEach(chapter => {
                    const item = document.createElement("div");
                    item.textContent = chapter.label; item.className = "toc-item";
                    item.onclick = () => { rendition.display(chapter.href); sidebar.classList.remove("active"); };
                    tocContainer.appendChild(item);
                });
            });
            
            rendition.on("rendered", async (section) => {
                const doc = await book.load(section.href);
                renderCleanText(doc.body.innerText);
            });
            rendition.display();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function renderCleanText(text) {
        customViewer.innerHTML = "";
        audioCache.clear(); 
        text.split(/\r?\n/).filter(l => l.trim()).forEach(line => {
            const p = document.createElement("p");
            p.textContent = line.trim();
            p.onclick = () => startReading(p);
            customViewer.appendChild(p);
        });
        status.innerText = "Chapter Loaded";
        document.getElementById("viewer").scrollTop = 0;
    }

    async function fillBuffer(startEl) {
        let next = startEl;
        let count = 0;
        while (next && count < BUFFER_SIZE) {
            const text = next.innerText;
            if (!audioCache.has(text) && !pendingRequests.has(text)) {
                fetchAndCache(text);
            }
            next = next.nextElementSibling;
            count++;
        }
    }

    async function fetchAndCache(text) {
        pendingRequests.add(text);
        try {
            const response = await fetch("https://kokoro.orator-audio.com/v1/audio/speech", {
                method: "POST", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    model: "tts-1-hd", 
                    voice: "af_heart(1)+af_aoede(1)+af_nicole(1)+af_sky(1)", 
                    input: text, 
                    speed: 1.2,
                })
            });
            if (!response.ok) throw new Error("Fetch failed");
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            audioCache.set(text, url);
        } catch (e) {
            console.error("Cache error:", e);
        } finally {
            pendingRequests.delete(text);
        }
    }

    async function startReading(el) {
        if (!el) return;
        stopAudio(false);
        isPlaying = true; 
        playPauseBtn.innerText = "Stop TTS";
        currentParagraph = el;
        
        await requestWakeLock();
        
        document.querySelectorAll('.speaking, .buffering').forEach(s => s.classList.remove('speaking', 'buffering'));
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        nowReading.innerText = el.innerText;
        fillBuffer(el); // Start filling buffer for upcoming lines

        const cachedUrl = audioCache.get(el.innerText);
        if (cachedUrl) {
            playAudio(cachedUrl);
        } else {
            el.classList.add('buffering');
            status.innerText = "Generating...";
            // If not in cache, fetch immediately
            await fetchAndCache(el.innerText);
            const freshUrl = audioCache.get(el.innerText);
            if (freshUrl) playAudio(freshUrl);
        }
    }

    function playAudio(url) {
        currentHowl = new Howl({
            src: [url],
            format: ['mp3'],
            html5: true,
            onplay: () => {
                if (currentParagraph) {
                    currentParagraph.classList.remove('buffering');
                    currentParagraph.classList.add('speaking');
                }
                status.innerText = "Playing";
            },
            onend: () => {
                if (isPlaying) {
                    currentParagraph.classList.remove('speaking');
                    readNext();
                }
            }
        });
        currentHowl.play();
    }

    function stopAudio(resetUI = true) {
        if (currentHowl) { 
            currentHowl.stop(); 
            currentHowl.unload();
            currentHowl = null; 
        }
        if (resetUI) { 
            isPlaying = false; 
            if (currentParagraph) currentParagraph.classList.remove('speaking', 'buffering'); 
            playPauseBtn.innerText = "Resume TTS"; 
            status.innerText = "Paused";
            releaseWakeLock();
        }
    }

    async function readNext() {
        if (!currentParagraph || !isPlaying) return;
        const next = currentParagraph.nextElementSibling;
        if (next) {
            startReading(next);
        } else {
            status.innerText = "Next Chapter...";
            await rendition.next();
            setTimeout(() => { 
                const firstP = customViewer.querySelector('p'); 
                if (firstP) startReading(firstP); 
            }, 800);
        }
    }

    playPauseBtn.onclick = () => isPlaying ? stopAudio(true) : (currentParagraph && startReading(currentParagraph));
    document.getElementById("next").onclick = () => rendition.next();
    document.getElementById("prev").onclick = () => rendition.prev();
</script>
</body>
</html>
