<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orator Reader</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/2.6.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.2.15/epub.min.js"></script>
</head>
<body class="body">


<div id="app" class="container-fluid">

    <div id="view-splash" class="orator-view orator-view-splash">
        <div class="text-center w-100">
            <h1>ORATOR WEB</h1>
            <div class="d-flex justify-content-center">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <div id="view-library" class="orator-view orator-view-library">
        <nav class="navbar navbar-dark bg-dark px-3 shadow">
            <span class="navbar-brand mb-0 h1">ORATOR Web</span>
            <button id="btn-settings" class="btn btn-outline-light btn-sm">⚙️</button>
        </nav>

        <div id="library-list" class="flex-grow-1 overflow-auto">
        </div>

        <label class="btn btn-primary rounded-circle position-fixed bottom-0 end-0 m-4 shadow-lg"
               style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px;">
            +
            <input type="file" id="epub-input" accept=".epub" hidden>
        </label>
    </div>

</div>
<script src="js/app.js"></script>


</body>
</html>
