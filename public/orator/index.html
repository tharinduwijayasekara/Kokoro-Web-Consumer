<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">

    <title>Orator Reader</title>

    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png?v=1">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png?v=1">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png?v=1">
    <link rel="manifest" href="images/site.webmanifest?v=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <script type='text/javascript' src='js/vendor/tinycolor.js'></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>

    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

    <!--
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/2.6.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.2.15/epub.min.js"></script>
    -->

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jshashes/1.0.8/hashes.min.js" integrity="sha512-1HyPmPHvi5wFUctYkBhwOYgXmMdbPrDaXKBrbGRI3o1CQkTKazG/RKqR8QwVIjTDOQ3uAOPOFkEbzi99Td6yiQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Handlee&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Radley:ital@0;1&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Custom styles -->
    <link id="styles-for-init" rel="stylesheet" href="css/styles.css">
    <script>
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = "css/styles.css?v=" + Date.now();
        document.head.appendChild(link);
    </script>

    <style id="app-styles">

    </style>

</head>
<body class="body">


<div id="app" class="container-fluid" style="background-color: black; color: white" data-bs-theme="dark">

    <div id="view-splash" class="orator-view orator-view-splash">
        <div class="text-center w-100">
            <img src="images/android-chrome-512x512.png" width="128" class="mb-4">
            <h1>ORATOR</h1>
            <p class="mb-4">Loading your library</p>
            <div class="d-flex justify-content-center">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <div id="view-library" class="orator-view orator-view-library bg-dark">
        <div class="library-container flex-grow-1 overflow-auto">
            <nav class="navbar navbar-dark bg-dark px-3 shadow">
                <!--<img class="navbar-toggler-icon" src="images/icon-v2.png" width="128" class="mb-4">-->
                <span class="navbar-brand mb-0 h1">ORATOR</span>
            </nav>
            <div class="library-top-image d-flex justify-content-center align-items-center text-light">
                <h1 class="library-top-text">Your Library</h1>
                <p></p>
            </div>
            <div class="library-list-wrapper">
                <div class="library-list-header-buttons">
                    <button class="btn btn-sm btn-library-view-toggle">
                        <i class="bi bi-view-list"></i>
                        <i class="bi bi-grid-3x3-gap-fill"></i>
                    </button>
                </div>
                <div class="library-currently-reading"></div>
                <div id="library-list"></div>
                <div class="library-text-wrapper">
                    <textarea id="userTextInput" placeholder="Or enter text yourself :)"></textarea>
                    <button class="btn btn-sm" onclick="App.importUserInput()">
                        <i class="bi bi-arrow-right"></i> Import
                    </button>
                </div>
            </div>
        </div>

        <label class="btn btn-dark rounded-circle position-fixed bottom-0 end-0 m-4 shadow-lg btn-import-books">
            <i class="bi bi-plus"></i>
            <input type="file" id="epub-input" accept=".epub" hidden multiple>
        </label>
    </div>

    <div id="view-reader" class="orator-view orator-view-reader" data-orator-book-id="">
        <nav class="navbar navbar-dark bg-black px-3 shadow flex-nowrap">
            <div class="left-buttons d-flex flex-row justify-content-start overflow-hidden">
                <button id="btn-reader-back" class="btn btn-sm flex-shrink-0">
                    <i class="bi bi-arrow-left text-light" style="font-size: 20px"></i>
                </button>
                <div id="navbar-book-name" class="m-auto text-truncate">Book Name</div>
            </div>

            <div class="navbar-action-button-group">
                <button id="btn-reader-fullscreen" class="btn btn-sm">
                    <i class="bi bi-fullscreen text-light" style="font-size: 20px"></i>
                </button>
                <button id="btn-reader-settings" class="btn btn-sm">
                    <i class="bi bi-gear-fill text-light" style="font-size: 20px"></i>
                </button>
            </div>
        </nav>

        <div class="reader-container-wrapper flex-grow-1 overflow-auto">
            <div class="reader-container"></div>
            <div class="reader-container-padding"></div>
        </div>

        <div id="playback-controls" class="position-fixed d-flex flex-column justify-content-end">
            <div class="buffer-health">
                <div class="buffer-health-info">
                    <i class="bi bi-check-all"></i>
                    <span>X</span>
                    <div class="spinner-border spinner-border-sm" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                <div class="chapter-timings">
                    <div class="chapter-timings-left">...</div>
                    <div class="chapter-timings-right">...</div>
                </div>
            </div>
            <div class="player-track">
                <div class="progress chapter-progress">
                    <div class="progress-bar bg-black w-0" role="progressbar" aria-valuenow="75" aria-valuemin="0"
                         aria-valuemax="100"></div>
                </div>
                <div class="progress book-progress">
                    <div class="progress-bar bg-black w-0" role="progressbar" aria-valuenow="75" aria-valuemin="0"
                         aria-valuemax="100"></div>
                </div>
            </div>
            <div class="player-controls d-flex flex-row justify-content-between text-black">
                <button id="btn-reader-chapters" class="btn btn-sm">
                    <i class="bi bi-list-ol"></i>
                </button>
                <button id="btn-reader-previous" class="btn btn-sm">
                    <i class="bi bi-skip-backward-fill"></i>
                </button>
                <button id="btn-reader-playpause" class="btn btn-sm">
                    <i class="bi bi-play-fill"></i>
                    <i class="bi bi-pause-fill"></i>
                </button>
                <button id="btn-reader-next" class="btn btn-sm">
                    <i class="bi bi-skip-forward-fill"></i>
                </button>
                <button id="btn-reader-recenter" class="btn btn-sm">
                    <i class="bi bi-crosshair"></i>
                </button>
            </div>
        </div>

        <div id="playback-chapters" class="">
            <div class="orator-backdrop darken"></div>
            <div class="playback-chapters-list-container">
                <div class="playback-chapter-header shadow-sm">
                    <h1>Chapters</h1>
                </div>
                <div class="playback-chapters-list"></div>
            </div>
        </div>

        <div id="playback-settings" class="">
            <div class="playback-settings-wrapper">
                <div class="playback-settings-header">
                    Playback Settings
                </div>
                <div class="playback-settings">

                    <div class="accordion accordion-flush" id="accordionPlaybackSettings">
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#flush-collapseZero" aria-expanded="false"
                                        aria-controls="flush-collapseZero">
                                    Font Settings
                                </button>
                            </h2>
                            <div id="flush-collapseZero" class="accordion-collapse collapse"
                                 data-bs-parent="#accordionPlaybackSettings">
                                <div class="accordion-body">

                                    <div class="form-floating mb-3">
                                        <select class="form-select" id="font-input">
                                            <!-- rendered from default fonts -->
                                        </select>
                                        <label for="font-input">Font</label>
                                    </div>

                                    <div class="form-slider-stack">
                                        <label for="font-size-input" class="form-label">Font Size</label>
                                        <input type="range" class="form-range" min="5" max="20" id="font-size-input"
                                               data-show-on-change="true">
                                        <div><span></span> PT.</div>
                                    </div>
                                    <div class="form-slider-stack">
                                        <label for="font-line-input" class="form-label">Line Height</label>
                                        <input type="range" class="form-range" min="5" max="40" id="font-line-input"
                                               data-show-on-change="true">
                                        <div><span></span> PT.</div>
                                    </div>
                                    <div class="form-slider-stack">
                                        <label for="font-spacing-input" class="form-label">Letter Spacing</label>
                                        <input type="range" class="form-range" min="-1" max="2" step="1"
                                               id="font-spacing-input" data-show-on-change="true">
                                        <div><span></span></div>
                                    </div>

                                    <div class="color-settings">
                                        <div>
                                            <label class="form-label">Font</label>
                                            <div id="font-color-picker"></div>
                                        </div>
                                        <div>
                                            <label class="form-label">Highlight</label>
                                            <div id="font-highlight-picker"></div>
                                        </div>
                                        <div>
                                            <label class="form-label">Background</label>
                                            <div id="font-background-picker"></div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#flush-collapseOne" aria-expanded="false"
                                        aria-controls="flush-collapseOne">
                                    Speech Settings
                                </button>
                            </h2>
                            <div id="flush-collapseOne" class="accordion-collapse collapse"
                                 data-bs-parent="#accordionPlaybackSettings">
                                <div class="accordion-body">

                                    <div class="form-floating mb-3">
                                        <select class="form-select" id="speech-service-input">
                                            <option selected value="https://kokoro.orator-audio.com/v1/audio/speech">
                                                Kokoro
                                            </option>
                                            <option value="https://kokoroapp.orator-audio.com/edgetts/v1/audio/speech">
                                                EdgeTTS
                                            </option>
                                        </select>
                                        <label for="speech-service-input">Speech Service URL</label>
                                    </div>

                                    <div class="form-floating mb-3">
                                        <input disabled type="text" class="form-control" id="speech-voice-input"
                                               placeholder="af_heart">
                                        <label for="speech-speed-input">Voice</label>

                                        <div class="check-box-group check-box-group-voice kokoro active">
                                            <div class="check-box-group-title">You can select multiple voices to blend
                                                them together (limit: 5)
                                            </div>
                                            <!-- rendered at runtime -->
                                        </div>
                                        <div class="check-box-group check-box-group-voice edgetts">
                                            <!-- rendered at runtime -->
                                        </div>

                                    </div>

                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control" id="speech-speed-input"
                                               placeholder="1.0">
                                        <label for="speech-speed-input">Speed (1.1 recommended)</label>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#flush-collapseTwo" aria-expanded="false"
                                        aria-controls="flush-collapseTwo">
                                    Customize Pronounciation
                                </button>
                            </h2>
                            <div id="flush-collapseTwo" class="accordion-collapse collapse"
                                 data-bs-parent="#accordionPlaybackSettings">
                                <div class="accordion-body">

                                    <div class="speech-cust-container">
                                        <div class="speech-cust-items">
                                            <!-- items rendered here with speech-cust-item class -->
                                        </div>
                                        <div class="speech-cust-add-btn">
                                            <button class="btn btn-sm">
                                                <i class="bi bi-plus"></i>
                                            </button>
                                        </div>
                                    </div>


                                </div>
                            </div>
                        </div>
                    </div>


                </div>
            </div>
        </div>

    </div>

    <div id="message-board-wrapper" style="display: none">
        <div class="message-board-backdrop">
            <div class="message-board-inner">
                <div class="message-board-header">Message board</div>
                <div class="message-board-container">
                    <p></p>
                    <div class="progress message-progress">
                        <div class="progress-bar w-0" role="progressbar" aria-valuenow="75" aria-valuemin="0"
                             aria-valuemax="100"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="error-banner" style="display: none">
        Text
    </div>

</div>

<script>
    const script = document.createElement('script');
    script.src = 'js/app.js?v=' + Date.now();
    //script.src = 'js/app.js';
    document.head.appendChild(script);
</script>

<script type="text/html" id="template-book-item-list">
    <div class="book-item" data-id="{{id}}">
        <div class="book-background" style="background-image: url({{cover}})"></div>
        <div class="book-item-contianer">
            <img src="{{cover}}" class="book-cover-thumb">
            <div class="book-details">
                <div class="book-header">
                    <div>
                        <div class="fw-bold">{{title}}</div>
                        <p class="text-muted">
                            {{author}}
                            </br>
                            Published on: {{pubDate}}
                            </br>
                            Imported on: {{importedAt}}
                            </br>
                            Reading time: {{readingTime}}
                        </p>
                    </div>
                    <button class="btn btn-sm orator-btn-delete-book" data-id="{{id}}">
                        <i class="bi bi-trash3-fill" style="font-size: 20px"></i>
                    </button>
                </div>
                <div class="book-description">
                    {{bookDescText}}
                </div>
            </div>
        </div>
        <div class="book-item-progress-container win7-progress">
            <div class="book-item-progress win7-progress-fill" style="width: {{progress}}%"></div>
        </div>
    </div>
</script>

<script type="text/html" id="template-book-item-grid">
    <div class="book-item" data-id="{{id}}">
        <div class="book-item-contianer">
            <img src="{{cover}}" class="book-cover-thumb">
            <div class="book-details">
                <div class="fw-bold">{{title}}</div>
                <p class="text-muted">{{author}}</p>
            </div>
            <button class="btn btn-sm orator-btn-delete-book" data-id="{{id}}">
                <i class="bi bi-x" style="font-size: 25px"></i>
            </button>
            <div class="book-item-progress-container win7-progress">
                <div class="book-item-progress win7-progress-fill" style="width: {{progress}}%"></div>
            </div>
        </div>
    </div>
</script>


</body>
</html>
