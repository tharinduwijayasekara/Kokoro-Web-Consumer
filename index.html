<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kokoro TTS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- WaveSurfer -->
  <script src="https://unpkg.com/wavesurfer.js@7"></script>

  <style>
    :root {
      --bg: #0b0f19;
      --panel: #111827;
      --panel-soft: #0f172a;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --success: #22c55e;
      --error: #ef4444;
      --border: #1f2933;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --radius: 14px;
      --shadow: 0 20px 50px rgba(0,0,0,0.6);
      --font: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont;
      height: 100%;
    }

    * {
      box-sizing: border-box;
      font-family: var(--font);
    }

    body {
      margin: 0;
      padding: 32px;
      background: radial-gradient(circle at top, #111827, #020617);
      color: var(--text);
    }

    .app {
      max-width: 900px;
      margin: auto;
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* HEADER */
    .header {
      padding: 24px 28px;
      background: linear-gradient(
        135deg,
        #0f172a,
        #020617
      );
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    /* CONTENT */
    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      padding: 16px;
      font-size: 15px;
      color: var(--text);
      background: var(--panel-soft);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(96,165,250,0.25);
    }

    button {
      align-self: flex-start;
      padding: 12px 30px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(
        135deg,
        var(--accent),
        #7dd3fc
      );
      color: #020617;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.1s, filter 0.2s;
    }

    button:hover {
      filter: brightness(1.1);
    }

    button:active {
      transform: scale(0.97);
    }

    .status {
      font-size: 14px;
      font-weight: 500;
    }

    .success {
      color: var(--success);
    }

    .error {
      color: var(--error);
    }

    .muted {
      color: var(--muted);
    }

    /* PLAYER */
    .player {
      margin-top: 6px;
      padding: 16px;
      background: var(--panel-soft);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    #waveform {
      height: 140px;
      border-radius: 10px;
      overflow: hidden;
    }

    audio {
      width: 100%;
      margin-top: 12px;
      filter: invert(1) hue-rotate(180deg);
    }
  </style>
</head>
<body>

  <div class="app">
    <!-- HEADER -->
    <div class="header">
      <h1>Kokoro Text-to-Speech</h1>
      <p>Paste text, generate speech, and preview audio instantly</p>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <textarea id="textInput" placeholder="Type or paste your text here…"></textarea>

      <button id="playBtn">▶ Generate & Play</button>

      <div id="status" class="status muted">
        Ready.
      </div>

      <div class="player">
        <div id="waveform"></div>
        <audio id="audio" controls></audio>
      </div>
    </div>
  </div>

  <script>
    const playBtn = document.getElementById("playBtn");
    const textInput = document.getElementById("textInput");
    const statusEl = document.getElementById("status");
    const audioEl = document.getElementById("audio");

    const waveSurfer = WaveSurfer.create({
      container: "#waveform",
      waveColor: "#1e293b",
      progressColor: "#60a5fa",
      cursorColor: "#e5e7eb",
      barWidth: 2,
      barRadius: 2,
      height: 140,
      normalize: true
    });

    // Determine API URL dynamically
    const API_URL = window.location.hostname === "kokoroapp.orator-audio.com"
      ? "https://kokoro.orator-audio.com/v1/audio/speech"
      : "http://192.168.8.100:8888/v1/audio/speech";

    playBtn.addEventListener("click", async () => {
      const text = textInput.value.trim();
      if (!text) {
        setStatus("Please enter some text first.", "error");
        return;
      }

      setStatus("Generating audio…", "muted");

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "kokoro",
            input: text,
            voice: "af_heart(2)+af_sky(1)+bm_lewis(1)",
            response_format: "mp3",
            download_format: "mp3",
            speed: 1.2,
            stream: false,
            return_download_link: false,
            lang_code: "a",
            volume_multiplier: 1,
            normalization_options: {
              normalize: true,
              unit_normalization: false,
              url_normalization: true,
              email_normalization: true,
              optional_pluralization_normalization: true,
              phone_normalization: true,
              replace_remaining_symbols: true
            }
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        audioEl.src = url;
        waveSurfer.load(url);

        setStatus("Audio generated successfully ✔", "success");
      } catch (err) {
        console.error(err);
        setStatus("Failed to generate audio ✖", "error");
      }
    });

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = `status ${type}`;
    }
  </script>

</body>
</html>
