<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line-by-Line Streaming EPUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Radley&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.88/dist/epub.min.js"></script>
    <style>
        :root { --sidebar-width: 280px; }
        body { font-family: system-ui, sans-serif; display: flex; height: 100vh; margin: 0; background: #fff; overflow: hidden; flex-direction: column; }
        #app { display: flex; flex: 1; overflow: hidden; position: relative; }
        #sidebar { width: var(--sidebar-width); border-right: 1px solid #ddd; overflow-y: auto; padding: 20px; background: #fcfcfc; transition: transform 0.3s ease; z-index: 1001; }
        #main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; height: 100%; }
        
        /* The visible text area */
        #viewer { flex: 1; overflow-y: auto !important; padding: 20px 40px 100px 40px; }
        
        /* The hidden EPUB engine element */
        #epub-render-ghost { display: none; }

        #controls { padding: 10px; border-bottom: 1px solid #ddd; background: #fff; display: flex; gap: 8px; align-items: center; z-index: 1000; }
        #player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; border-top: 1px solid #ddd; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1002; padding: 5px; }
        .toc-item { cursor: pointer; color: #333; margin-bottom: 8px; font-size: 14px; padding: 8px; border-radius: 4px; }
        .toc-item:hover { background: #eee; }
        button { padding: 8px 12px; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 4px; font-size: 14px; }
        
        #custom-content p { font-family: 'Radley', serif; font-size: 18px; line-height: 22px; transition: background 0.3s ease; padding: 10px; margin: 0 0 4px 0; cursor: pointer; border-radius: 4px; color: #222; }
        #custom-content p:hover { background: #f0f7ff; }
        .speaking { background: #d4edda !important; font-weight: 500; }

        @media (max-width: 768px) {
            #menu-toggle { display: block; }
            #sidebar { position: absolute; left: 0; top: 0; bottom: 80px; transform: translateX(-100%); box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
            #sidebar.active { transform: translateX(0); }
            #viewer { padding: 15px 15px 100px 15px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <h3>Library</h3>
        <input type="file" id="input" accept=".epub" style="width: 100%; margin-bottom: 15px;">
        <div id="toc"></div>
    </div>
    <div id="main">
        <div id="controls">
            <button id="menu-toggle">☰ Menu</button>
            <button id="prev">←</button>
            <button id="next">→</button>
            <span id="status" style="font-size: 11px; color: #666;">Ready</span>
        </div>
        <div id="viewer">
            <div id="custom-content"></div>
        </div>
        <div id="epub-render-ghost"></div>
    </div>
</div>

<div id="player-bar">
    <button id="playPauseBtn" style="font-weight: bold; min-width: 120px;">Stop TTS</button>
    <span id="nowReading" style="margin-top: 5px; font-size: 12px; color: #444; text-align: center; max-width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
</div>

<script>
    const input = document.getElementById("input"), status = document.getElementById("status"), playPauseBtn = document.getElementById("playPauseBtn"), nowReading = document.getElementById("nowReading"), sidebar = document.getElementById("sidebar"), menuToggle = document.getElementById("menu-toggle"), customViewer = document.getElementById("custom-content");
    let book, rendition, currentAudio, isPlaying = false, currentParagraph = null;

    menuToggle.onclick = () => sidebar.classList.toggle("active");

    input.addEventListener("change", (e) => {
        const reader = new FileReader();
        reader.onload = async (event) => {
            if (book) book.destroy();
            book = ePub(event.target.result);
            // Render to the HIDDEN ghost div instead of the viewer
            rendition = book.renderTo("epub-render-ghost", { width: "100%", height: "100%" });
            
            book.loaded.navigation.then(nav => {
                const tocContainer = document.getElementById("toc");
                tocContainer.innerHTML = "<h4>Contents</h4>";
                nav.toc.forEach(chapter => {
                    const item = document.createElement("div");
                    item.textContent = chapter.label; item.className = "toc-item";
                    item.onclick = () => { rendition.display(chapter.href); sidebar.classList.remove("active"); };
                    tocContainer.appendChild(item);
                });
            });
            
            rendition.on("rendered", async (section) => {
                const doc = await book.load(section.href);
                renderCleanText(doc.body.innerText);
            });
            rendition.display();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function renderCleanText(text) {
        customViewer.innerHTML = "";
        text.split(/\r?\n/).filter(l => l.trim()).forEach(line => {
            const p = document.createElement("p");
            p.textContent = line.trim();
            p.onclick = () => startReading(p);
            customViewer.appendChild(p);
        });
        status.innerText = "Chapter Loaded";
        document.getElementById("viewer").scrollTop = 0;
    }

    async function startReading(el) {
        if (!el) return;
        stopAudio(false);
        isPlaying = true; playPauseBtn.innerText = "Stop TTS";
        currentParagraph = el;
        document.querySelectorAll('.speaking').forEach(s => s.classList.remove('speaking'));
        el.classList.add('speaking');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        nowReading.innerText = el.innerText;
        await streamTTS(el.innerText);
    }

    function stopAudio(resetUI = true) {
        if (currentAudio) { currentAudio.pause(); currentAudio.src = ""; currentAudio = null; }
        if (resetUI) { isPlaying = false; if (currentParagraph) currentParagraph.classList.remove('speaking'); playPauseBtn.innerText = "Resume TTS"; }
    }

    async function streamTTS(text) {
        try {
            const response = await fetch("https://kokoro.orator-audio.com/v1/audio/speech", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ model: "kokoro", voice: "af_heart(1)+af_aoede(1)", input: text, speed: 1.2, stream: true })
            });
            const mediaSource = new MediaSource();
            currentAudio = new Audio();
            currentAudio.src = URL.createObjectURL(mediaSource);
            
            mediaSource.onsourceopen = async () => {
                const sourceBuffer = mediaSource.addSourceBuffer("audio/mpeg");
                const reader = response.body.getReader();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    await new Promise(r => { if (!sourceBuffer.updating) r(); else sourceBuffer.onupdateend = r; });
                    sourceBuffer.appendBuffer(value);
                    if (currentAudio && currentAudio.paused && isPlaying) currentAudio.play().catch(()=>{});
                }
                await new Promise(r => { if (!sourceBuffer.updating) r(); else sourceBuffer.onupdateend = r; });
                if (mediaSource.readyState === "open") mediaSource.endOfStream();
            };
            currentAudio.onended = () => { if (isPlaying) { currentParagraph.classList.remove('speaking'); readNext(); } };
        } catch (err) { status.innerText = "Stream Error"; }
    }

    async function readNext() {
        if (!currentParagraph || !isPlaying) return;
        const next = currentParagraph.nextElementSibling;
        if (next) startReading(next);
        else {
            status.innerText = "Next Chapter...";
            await rendition.next();
            setTimeout(() => { const f = customViewer.querySelector('p'); if (f) startReading(f); }, 800);
        }
    }

    playPauseBtn.onclick = () => isPlaying ? stopAudio(true) : (currentParagraph && startReading(currentParagraph));
    document.getElementById("next").onclick = () => rendition.next();
    document.getElementById("prev").onclick = () => rendition.prev();
</script>
</body>
</html>
